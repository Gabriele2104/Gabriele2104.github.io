<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
    <title>Gestione economica</title>
</head>
<body>
    <section class="container">
        <h1>Calcola la gestione del denaro</h1>
        <input type="number" class="fatturato" placeholder="Inserisci somma lorda">
        <p>Dovrai pagare: <span class="tasse"></span>€ di tasse e contributi</p>
        <h2 class="sold_rim">Soldi rimasti: <span class="rimasti"></span>€ </h2>
        <section class="gestione_spese">
            <hr>
            <h2>Come collocare i soldi</h2>
            <p class="gestione">Cibo: €</p>
            <p class="gestione">Bollette: €</p>
            <p class="gestione">Veicolo: €</p>
            <p class="gestione">Affitto / Mutuo: €</p>
            <p class="gestione">Investimenti: €</p>
        </section>
    </section>
</body>
</html>
